<!doctype html>
<html lang="fr" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#FAF6EF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1510" media="(prefers-color-scheme: dark)" />
    <!-- Block browser auto-translate: mutating the DOM behind React's back
         crashes reconciliation with NotFoundError on insertBefore.
         A real i18n switcher inside the app supersedes this. -->
    <meta name="google" content="notranslate" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <title>Staff — Tonton Francky</title>
    <script>
      // Block flash of wrong theme
      (function () {
        try {
          const t = localStorage.getItem('tf-theme');
          const m = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (t === 'dark' || (!t && m)) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
