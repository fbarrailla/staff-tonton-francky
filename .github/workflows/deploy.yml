name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Publishable (anon) Supabase credentials — these are designed for
          # client-side use, end up in the bundle either way, and are gated
          # by RLS. Keeping them inline avoids the "set the secret and
          # remember to re-deploy" dance. Rotate by editing this file.
          # NEVER inline the service_role / secret key here.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://bcjjofdnyotmfhsuvkut.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'sb_publishable_FFFgMMec4ijm1RUg4trbBw_GcjhYj4M' }}

      - name: SPA fallback (copy index.html to 404.html)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
